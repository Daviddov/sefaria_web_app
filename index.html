<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ספר הזוהר</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>📜 ספר הזוהר</h1>

        <div class="controls">
            <div class="form-group">
                <label for="sectionSelect">בחר פרק:</label>
                <select id="sectionSelect" disabled>
                    <option value="">טוען פרקים...</option>
                </select>
            </div>

            <button class="generate-btn" id="generateBtn" disabled>📄 צור מסמך Word</button>
            <div id="status" class="status" style="display: none;"></div>
        </div>
    </div>

    <script>
        class Manager {
            constructor() {
                this.baseUrl = 'https://www.sefaria.org/api';
                this.book = null;
                this.init();
            }

            init() {
                document.getElementById('generateBtn').addEventListener('click', () => this.generateDocument());
                document.getElementById('sectionSelect').addEventListener('change', (event) => this.updateSelectedSection(event));
            }

            log(...args) {
                console.log(...args);
            }

            showError(message) {
                this.showStatus(message, 'error');
            }

            showStatus(message, type = 'loading') {
                const statusEl = document.getElementById('status');
                statusEl.textContent = message;
                statusEl.className = `status ${type}`;
                statusEl.style.display = 'block';

                if (type === 'success' || type === 'error') {
                    setTimeout(() => {
                        statusEl.style.display = 'none';
                    }, 5000);
                }
            }

            async fetchData(url) {
                const response = await fetch(url);
                return await response.json();
            }

            async fetchSections(bookName) {
                try {
                    this.log('📚 Loading Book sections...');
                    const data = await this.fetchData(`${this.baseUrl}/v2/raw/index/${bookName}`);
                    this.log('📊 Book data:', data);
                    return data;
                } catch (error) {
                    this.log(`❌ Error loading book sections: ${error.message}`, 'error');
                    this.showError('שגיאה בטעינת חלקי הספר');
                }
            }

            async fetchChapterData(chapterRef) {
                try {
                    const version1 = 'hebrew|Vocalized Zohar, Israel 2013';
                    const version2 = 'hebrew|Hebrew Translation';
                    const textUrl = `${this.baseUrl}/v3/texts/${encodeURIComponent(chapterRef)}?version=${encodeURIComponent(version1)}&version=${encodeURIComponent(version2)}&fill_in_missing_segments=1&return_format=wrap_all_entities`;

                    this.log(`🌐 Text URL: ${textUrl}`);
                    const data = await this.fetchData(textUrl);
                    this.log(`📊 Chapter ${chapterRef} text data:`, data);
                    return data;
                } catch (error) {
                    this.log(`❌ Error fetching chapter data: ${error.message}`, 'error');
                    this.showError('שגיאה בטעינת פרק');
                }
            }

            async fetchCommentaries(ref) {
                try {
                    this.log(`📚 Fetching commentaries: ${ref}`);
                    const url = `${this.baseUrl}/links/${encodeURIComponent(ref)}?with_text=1`;
                    return await this.fetchData(url);
                } catch (error) {
                    this.log(`❌ Error: ${error.message}`, 'error');
                }
            }

            extractSectionTitles(bookData) {
                const titles = [];
                const nodes = bookData?.alt_structs?.Daf?.nodes || [];
                nodes.forEach(node => {
                    node.nodes.forEach(subNode => {
                        titles.push(subNode.titles);
                    });
                });
                return titles;
            }

            extractParagraphRefs(bookData, currentTitle) {
                const refs = [];
                const nodes = bookData?.alt_structs?.Essay?.nodes || [];
                nodes.forEach(node => {
                    node.nodes.forEach(subNode => {
                        if (Array.isArray(subNode.refs) && subNode.refs.some(ref => ref.includes(currentTitle))) {
                            refs.push(subNode.refs);
                        }
                    });
                });
                return refs;
            }

            orderCommentaries(allCommentaries) {
                const mapCommentaries = new Map();

                for (const item of allCommentaries) {
                    const arrayCommentaries = Array.isArray(item) ? item : [item];

                    for (const commentary of arrayCommentaries) {
                        if (!commentary || !commentary.anchorRef || !commentary.ref || commentary.category !== "Commentary") {
                            continue;
                        }

                        if (!mapCommentaries.has(commentary.anchorRef)) {
                            mapCommentaries.set(commentary.anchorRef, []);
                        }

                        mapCommentaries.get(commentary.anchorRef).push(commentary);
                    }
                }

                for (const [anchorRef, commentaries] of mapCommentaries.entries()) {
                    commentaries.sort((a, b) => a.ref.localeCompare(b.ref));
                }

                return mapCommentaries;
            }

            populateSectionSelect(currentBook) {
                const select = document.getElementById('sectionSelect');
                select.innerHTML = '<option value="">בחר פרק...</option>';

                currentBook.sectionsTitles.forEach((titleGroup, index) => {
                    const option = document.createElement('option');
                    option.value = index;
                    option.textContent = titleGroup[1].text;
                    select.appendChild(option);
                });

                select.disabled = false;
            }

            async updateSelectedSection(event) {
                const selectedIndex = event.target.value;
                if (selectedIndex === '') return;

                try {
                    this.showStatus('טוען פרק חדש...', 'loading');

                    const book = this.book;
                    book.currentSectionTitle = book.sectionsTitles[selectedIndex][0].text;
                    book.currentSectionTitleHe = book.sectionsTitles[selectedIndex][1].text;
                    book.paragraphsRefs = this.extractParagraphRefs(this.bookData, book.currentSectionTitle);
                    book.chapters.refs = book.paragraphsRefs;

                    const chapterRef = `${book.name}, ${book.currentSectionTitle}`;
                    const chapterData = await this.fetchChapterData(chapterRef);

                    book.chapters.alt = chapterData.alts || [];
                    book.chapters.text = chapterData?.versions?.[0]?.text || [];
                    book.chapters.heText = chapterData?.versions?.[1]?.text || [];

                    const unorderedCommentaries = await this.fetchCommentaries(chapterRef);
                    book.chapters.commentaries = this.orderCommentaries(unorderedCommentaries);

                    this.book = book;
                    this.showStatus('פרק נטען בהצלחה!', 'success');
                    document.getElementById('generateBtn').disabled = false;    
                } catch (error) {
                    console.error('Error updating section:', error);
                    this.showError('שגיאה בעדכון הפרק: ' + error.message);
                }
            }

                      async generateDocument() {
                const book = this.book;
                if (!book) {
                    this.showError('הספר לא נטען עדיין');
                    return;
                }

                this.showStatus('יוצר מסמך Word...', 'loading');

                try {
                    this.footnoteCounter = 1;
                    this.endnoteCounter = 1;

                    // יצירת כותרת המסמך
                    let title = `ספר הזוהר - ${book.currentSectionTitleHe}`;

                    let html = `
        <!DOCTYPE html>
        <html dir="rtl" lang="he">
        <head>
            <meta charset="UTF-8">
            <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
            <title>${title}</title>
            <style>

                
                body {
                    font-family: "Times New Roman", serif;
                    direction: rtl;
                    text-align: right;
                }
                
                /* סגנון כותרת ראשית */
                .main-title {
                    mso-style-name: "כותרת ראשית זוהר";
                    font-size: 24pt;
                    font-weight: bold;
                    page-break-inside: avoid;
                }
                
                /* סגנון כותרת פרק */
                .chapter-title {
                    mso-style-name: "כותרת פרק זוהר";
                    font-size: 20pt;
                    font-weight: bold;
                    page-break-before: always;
                    page-break-inside: avoid;

                }
                
                /* סגנון כותרת פיסקא */
                .paragraph-header {
                    mso-style-name: "כותרת פיסקא זוהר";
                    font-size: 16pt;
                    font-weight: bold;
                    page-break-before: always;
                }
                
                .paragraph-number {
                    mso-style-name: "מספר פיסקא זוהר";
                    font-size: 14pt;
                    color: #4B0082;
                    font-weight: bold;
                }
                
                /* סגנון טקסט ארמי ראשי */
                .paragraph-text {
                    mso-style-name: "טקסט ארמי זוהר";
                    font-size: 14.5pt;
                    font-weight: bold;

                }
                
                /* סגנון טקסט עברי */
                .paragraph-text-he {
                    font-size: 14pt;
                    mso-style-name: "טקסט עברי זוהר";                }
                
                /* סגנון מיכל פיסקא */
                .paragraph-container {
                    mso-style-name: "מיכל פיסקא זוהר";

                    page-break-inside: avoid;
                }
                
                
                /* סגנון פירוש מקומי */
                .inline-commentary {
                    mso-style-name: "פירוש מקומי זוהר";

                }
                
                /* סגנון כותרת פירוש */
                .inline-commentary-header {
                    mso-style-name: "כותרת פירוש זוהר";

                }
                
                /* סגנון מספר פירוש */
                .inline-commentary-number {
                    mso-style-name: "מספר פירוש זוהר";
                    font-size: 10pt;
                    color: #4B0082;
                    font-weight: bold;

                }
                
                /* סגנון כותרת מקור */
                .inline-commentary-title {
                    mso-style-name: "כותרת מקור זוהר";

                }
                
                /* סגנון טקסט פירוש */
                .inline-commentary-text {
                    mso-style-name: "טקסט פירוש זוהר";
  
                }
                
                /* סגנונות קישורים */
                .endnote-ref, .endnote-back {
                    mso-style-name: "קישור פירוש זוהר";
                    color: #FF4500;
                    text-decoration: none;
                    font-weight: bold;
                    font-size: 10pt;
                }
                
                .endnote-ref:hover, .endnote-back:hover {
                    text-decoration: underline;
                    color: #FF6347;
                }
                
                /* סגנון עליון לקישורים */
                sup {
                    font-size: 8pt;
                    vertical-align: super;
                }
                
                /* סגנונות הדפסה */
                @media print {
                    .paragraph-container {
                        page-break-inside: avoid;
                    }
                    
                    .chapter-title {
                        page-break-before: always;
                        page-break-after: avoid;
                    }
                    
                    .paragraph-header {
                        page-break-after: avoid;
                    }
                    
                    .inline-commentary {
                        page-break-inside: avoid;
                    }
                }
            </style>
        </head>
        <body>`;

                    // כותרת ומידע על המסמך
                    html += `<div class="main-title">${title}</div>`;

                    // עיבוד כל פרק
                    for (let i = 0; i < book.chapters.refs.length; i++) {
                        let chapterRefs = book.chapters.refs[i];

                        // כותרת פרק
                        html += `<div class="chapter-title">פרק ${i + 1}</div>`;

                        // עבור כל פסקה בפרק
                        for (let j = 0; j < chapterRefs.length; j++) {
                            const ref = chapterRefs[j];
                            const hebrewText = book.chapters.heText[i]?.[j] || '';
                            const aramicText = book.chapters.text[i]?.[j] || '';
                            const altText = book.chapters.alt[i]?.[j]?.he?.[0] || '';

                            // בדיקה אם יש תוכן
                            if (!hebrewText && !aramicText && !altText) {
                                continue;
                            }

                            html += `<div class="paragraph-container">`;

                            // כותרת הפיסקא
                            html += `
                    <div class="paragraph-header">
                        <span class="paragraph-number">${altText}</span>
                    </div>`;

                            // הטקסט הראשי
                            let paragraphText = aramicText || altText;
                            let paragraphTextHe = hebrewText || aramicText || altText;
                            const commentaries = book.chapters.commentaries.get(ref) || [];

                            // הוספת מספור פירושים (עם קישורים אינטראקטיביים)
                            commentaries.forEach(() => {
                                paragraphText += `
                                    <span class="MsoFootnoteReference">
                                        <a href="#ftn${this.endnoteCounter}" name="ftnref${this.endnoteCounter}">
                                            <sup>${this.endnoteCounter}</sup>
                                        </a>
                                    </span>`;
                                this.endnoteCounter++;
                            });


                            html += `<div class="paragraph-text">${paragraphText}</div>`;
                            html += `<div class="paragraph-text-he">${paragraphTextHe}</div>`;
                            html += `<hr>`;

                            // פירושים מקומיים תחת הפיסקה
                            if (commentaries && commentaries.length > 0) {
                                let commentaryCounter = this.endnoteCounter - commentaries.length;
                                commentaries.forEach((commentary) => {
                                    const commentaryText = commentary.he || commentary.text || 'אין טקסט זמין';
                                    const source = commentary.sourceHeRef || commentary.sourceRef || 'מקור לא ידוע';

                                    html += `
                                        <div style="mso-element:footnote" id="ftn${commentaryCounter}">
                                            <p class="MsoFootnoteText">
                                                <a href="#ftnref${commentaryCounter}"><sup>${commentaryCounter}</sup></a>
                                                ${commentaryText} <b>(${source})</b>
                                            </p>
                                        </div>`;
                                    commentaryCounter++;
                                });
                            }

                            html += `</div>`;
                        }
                    }

                    html += `</body></html>`;

                    // הורדת הקובץ
                    const blob = new Blob([html], { type: 'application/msword' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;

                    let filename = `זוהר_${book.currentSectionTitle.replace(/[^\u0590-\u05FF\w\s-]/g, '')}_עם_פירושים.doc`;

                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    URL.revokeObjectURL(url);

                    this.showStatus('מסמך Word נוצר בהצלחה!', 'success');

                } catch (error) {
                    console.error('Error generating document:', error);
                    this.showError('שגיאה ביצירת המסמך: ' + error.message);
                }
            }
        }

        // אתחול האפליקציה
        (async () => {
            const m = new Manager();
            const bookName = 'Zohar';

            try {
                m.showStatus('טוען נתונים...', 'loading');

                const bookData = await m.fetchSections(bookName);
                m.bookData = bookData; // Store book data for later use in section updates

                const book = {
                    name: bookName,
                    sectionsTitles: [],
                    paragraphsRefs: [],
                    chapters: {
                        refs: [],
                        alt: [],
                        heText: [],
                        text: [],
                        commentaries: new Map()
                    },
                    currentSectionTitle: null,
                    currentSectionTitleHe: null
                };

                book.sectionsTitles = m.extractSectionTitles(bookData);
                m.populateSectionSelect(book);

                // לא טוען אוטומטית את הפרק הראשון
                m.book = book;

                m.showStatus('נתונים נטענו בהצלחה!', 'success');

            } catch (error) {
                console.error('Initialization error:', error);
                m.showError('שגיאה באתחול: ' + error.message);
            }
        })();
    </script>
</body>
</html>
